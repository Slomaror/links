<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* Сетка для кнопок, как на макете */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        /* Стиль кнопок-коробок из макета */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 20px 10px;
            font-size: 16px;
            font-weight: 500;
            border: 3px solid #000000;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }
        .btn:active {
            background-color: #f0f0f0;
        }
        /* Большая кнопка внизу */
        .btn-full {
            width: 100%;
            padding: 30px 10px;
        }
        /* Сноска в подвале */
        .footer-text {
            font-size: 12px;
            font-style: italic;
            text-align: center;
            margin-top: 15px;
            color: #000000;
            line-height: 1.4;
        }
        /* Адаптивность для совсем маленьких экранов */
        @media (max-width: 380px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Первый ряд: Карты -->
    <div class="grid-2">
        <a href="https://yandex.ru/maps/org/aura_igr/126847755305/" class="btn" target="_blank">ЯндексКарты</a>
        <a href="https://2gis.ru/moscow/firm/70000001110439484" class="btn" target="_blank">2Гис</a>
    </div>

    <!-- Второй ряд: Телеграм и Макс -->
    <div class="grid-2">
        <a href="https://t.me/aura_vr_msk" class="btn" target="_blank">Telegramm</a>
        <a href="https://max.ru/id772793277929_biz" class="btn" target="_blank">MAX</a>
    </div>

    <!-- Третий ряд: Инста, ВК, Вотсап -->
    <div class="grid-3">
        <a href="https://www.instagram.com/aura_vr_msk?igsh=YXdpcDE2cW5hbnl0&utm_source=qr" class="btn" target="_blank">Instagramm*</a>
        <a href="https://vk.com/aura_vr_msk" class="btn" target="_blank">ВКонтакте</a>
        <a href="https://wa.me/79154725800" class="btn" target="_blank">WhatsApp</a>
    </div>

    <!-- Четвертый ряд: Главная кнопка звонка во всю ширину -->
    <a href="tel:+74996424215" class="btn btn-full">Позвонить нам</a>

    <!-- Юридический текст под кнопками -->
    <div class="footer-text">
        * Организация Meta признана экстремистской, запрещена на территории РФ
    </div>
</div>

</body>
</html>
