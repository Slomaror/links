<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Contacts</title>
    <!-- Подключаем библиотеку иконок Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #0d0617;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden; /* Защита от случайного бокового скролла */
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        /* Гибкие ряды */
        .flex-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        /* Общий стиль кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            padding: 20px 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border-radius: 0px;
            border-width: 2px;
            border-style: solid;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            min-width: 0; /* Позволяет флекс-элементам сжиматься меньше их содержимого */
            word-break: break-word; /* Перенос слов, если они не влезают */
        }

        /* Стилизация иконок внутри кнопок */
        .btn i {
            margin-right: 6px;
            font-size: 16px;
            flex-shrink: 0; /* Иконка не будет сжиматься в кашу */
            transition: transform 0.2s ease;
        }
        
        @media (hover: hover) {
            .btn:hover i {
                transform: scale(1.15);
            }
        }

        /* Симметричные блоки (Ряды 1 и 2) */
        .w-half { 
            flex: 1; 
        }

        /* Асимметричный блок (Ряд 3) */
        .w-insta  { flex: 3; }
        .w-vk     { flex: 4; }
        .w-wa     { flex: 4; }

        /* --- КАРТЫ: Яркий, насыщенный розовый --- */
        .btn-pink {
            background: rgba(236, 72, 153, 0.1);
            border-color: #ec4899;
        }
        @media (hover: hover) {
            .btn-pink:hover {
                background: #ec4899;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
                transform: translateY(-2px);
            }
        }
        .btn-pink:active {
            background: #ec4899;
            color: #0d0617;
        }

        /* --- МЕССЕНДЖЕРЫ: Глубокий, сочный фиолетовый --- */
        .btn-purple {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
        }
        @media (hover: hover) {
            .btn-purple:hover {
                background: #8b5cf6;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
                transform: translateY(-2px);
            }
        }
        .btn-purple:active {
            background: #8b5cf6;
            color: #0d0617;
        }

        /* --- ЗВОНОК: Розово-фиолетовый акцентный градиент --- */
        .btn-full {
            width: 100%;
            padding: 24px 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: #f43f5e;
        }
        @media (hover: hover) {
            .btn-full:hover {
                background: linear-gradient(135deg, #8b5cf6, #ec4899);
                border-color: #ffffff;
                color: #0d0617;
                box-shadow: 0 8px 25px rgba(244, 63, 94, 0.6);
                transform: translateY(-3px);
            }
        }
        .btn-full:active {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-color: #ffffff;
            color: #0d0617;
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        /* Умная мобильная адаптация для узких экранов */
        @media (max-width: 430px) {
            .flex-row {
                gap: 8px;
            }
            .container {
                gap: 8px;
            }
            .btn {
                padding: 16px 4px;
                font-size: 13px;
                /* Меняем направление на вертикальное, чтобы иконка встала над текстом, если совсем мало места */
                flex-direction: column; 
                gap: 4px;
            }
            .btn i {
                margin-right: 0; /* Убираем правый отступ, так как иконка теперь сверху */
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
