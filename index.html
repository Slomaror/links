<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            /* Основной черный фон с глубоким фиолетовым свечением из центра */
            background: radial-gradient(circle at center, #0f051d 0%, #05020a 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Гибкие ряды для реализации асимметрии из макета */
        .flex-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        /* Общий стиль всех кнопок-коробок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(15, 5, 29, 0.6);
            color: #ffffff;
            text-decoration: none;
            padding: 22px 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            /* Фиолетовая неоновая рамка */
            border: 2px solid #9333ea; 
            border-radius: 0px; /* Прямоугольная форма строго по макету */
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.2);
        }

        /* --- Геометрия по макету (соотношение сторон) --- */
        /* Ряд 1: Яндекс чуть меньше, 2Гис шире */
        .w-yandex { flex: 4; }
        .w-2gis   { flex: 5; }

        /* Ряд 2: Телеграм шире, Макс чуть меньше */
        .w-tg     { flex: 5; }
        .w-max    { flex: 4; }

        /* Ряд 3: Инстаграм поменьше, ВК и Вотсап пошире */
        .w-insta  { flex: 3; }
        .w-vk     { flex: 4; }
        .w-wa     { flex: 4; }

        /* --- Индивидуальные неоновые эффекты при наведении и клике --- */
        @media (hover: hover) {
            .btn:hover {
                transform: scale(1.02);
                border-color: #f43f5e; /* Переход в розовый при наведении */
                box-shadow: 0 0 20px rgba(244, 63, 94, 0.6), inset 0 0 8px rgba(244, 63, 94, 0.3);
                color: #ffffff;
            }
        }
        .btn:active {
            transform: scale(0.98);
            border-color: #f43f5e;
            background: rgba(244, 63, 94, 0.1);
        }

        /* Ряд 4: Кнопка звонка во всю ширину (Акцентный розово-фиолетовый неон) */
        .btn-full {
            width: 100%;
            padding: 26px 10px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.15), rgba(244, 63, 94, 0.15));
            border-color: #f43f5e; /* Розовый контур */
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.4);
        }
        @media (hover: hover) {
            .btn-full:hover {
                background: linear-gradient(135deg, #9333ea, #f43f5e);
                border-color: #ffffff;
                box-shadow: 0 0 25px rgba(244, 63, 94, 0.8);
            }
        }
        .btn-full:active {
            background: linear-gradient(135deg, #9333ea, #f43f5e);
            border-color: #ffffff;
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.4;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 400px) {
            .flex-row {
                gap: 10px;
            }
            .container {
                gap: 10px;
            }
            .btn {
                padding: 18px 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="flex-row">
        <a href="https://yandex.ru/maps/org/aura_igr/126847755305/" class="btn w-yandex" target="_blank">ЯндексКарты</a>
        <a href="https://2gis.ru/moscow/firm/70000001110439484" class="btn w-2gis" target="_blank">2Гис</a>
    </div>

    <div class="flex-row">

        <a href="https://max.ru/id772793277929_biz" class="btn w-max" target="_blank">MAX</a>
    </div>

    <div class="flex-row">
        <a href="https://www.instagram.com/aura_vr_msk?igsh=YXdpcDE2cW5hbnl0&utm_source=qr" class="btn w-insta" target="_blank">Instagram*</a>
        <a href="https://vk.com/aura_vr_msk" class="btn w-vk" target="_blank">ВКонтакте</a>
        <a href="https://wa.me/79154725800" class="btn w-wa" target="_blank">WhatsApp</a>
    </div>

    <a href="tel:+74996424215" class="btn btn-full">Позвонить нам</a>

    <div class="footer-text">
        * Организация Meta признана экстремистской, запрещена на территории РФ
    </div>
</div>

</body>
</html>
