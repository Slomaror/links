<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: radial-gradient(circle at center, #0f051d 0%, #05020a 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Гибкие ряды */
        .flex-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        /* Общий базовый стиль кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            padding: 22px 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 0px; /* Строгие прямоугольники по макету */
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- СИММЕТРИЧНЫЕ БЛОКИ (Ряды 1 и 2) --- */
        .w-half { 
            flex: 1; 
        }

        /* --- АСИММЕТРИЧНЫЙ БЛОК (Ряд 3) --- */
        .w-insta  { flex: 3; }
        .w-vk     { flex: 4; }
        .w-wa     { flex: 4; }

        /* --- ЦВЕТОВОЙ СТИЛЬ: КАРТЫ (Розовый неон) --- */
        .btn-pink {
            background: rgba(236, 72, 153, 0.03);
            border: 2px solid #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.15);
        }
        @media (hover: hover) {
            .btn-pink:hover {
                transform: scale(1.02);
                background: #ec4899;
                color: #05020a;
                box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
            }
        }
        .btn-pink:active {
            transform: scale(0.98);
            background: #ec4899;
            color: #05020a;
        }

        /* --- ЦВЕТОВОЙ СТИЛЬ: МЕССЕНДЖЕРЫ (Фиолетовый неон) --- */
        .btn-purple {
            background: rgba(147, 51, 234, 0.03);
            border: 2px solid #9333ea;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.15);
        }
        @media (hover: hover) {
            .btn-purple:hover {
                transform: scale(1.02);
                background: #9333ea;
                color: #05020a;
                box-shadow: 0 0 20px rgba(147, 51, 234, 0.6);
            }
        }
        .btn-purple:active {
            transform: scale(0.98);
            background: #9333ea;
            color: #05020a;
        }

        /* --- КНОПКА ЗВОНКА (Акцентный градиент во всю ширину) --- */
        .btn-full {
            width: 100%;
            padding: 26px 10px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(244, 63, 94, 0.2));
            border: 2px solid #f43f5e; /* Насыщенный кораллово-розовый */
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
        }
        @media (hover: hover) {
            .btn-full:hover {
                transform: scale(1.01);
                background: linear-gradient(135deg, #9333ea, #f43f5e);
                border-color: #ffffff;
                box-shadow: 0 0 25px rgba(244, 63, 94, 0.7);
            }
        }
        .btn-full:active {
            transform: scale(0.99);
            background: linear-gradient(135deg, #9333ea, #f43f5e);
            border-color: #ffffff;
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.4;
        }

        /* Мобильная адаптация */
        @media (max-width: 400px) {
            .flex-row, .container {
                gap: 10px;
            }
            .btn {
                padding: 18px 6px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Первый ряд: Симметричные карты (Розовый стиль) -->
    <div class="flex-row">
        <a href="https://yandex.ru/maps/org/aura_igr/126847755305/" class="btn btn-pink w-half" target="_blank">ЯндексКарты</a>
        <a href="https://2gis.ru/moscow/firm/70000001110439484" class="btn btn-pink w-half" target="_blank">2Гис</a>
    </div>

    <!-- Второй ряд: Симметричные ТГ и Макс (Фиолетовый стиль) -->
    <div class="flex-row">
        <a href="https://t.me/aura_vr_msk" class="btn btn-purple w-half" target="_blank">Telegram</a>
        <a href="https://max.ru/id772793277929_biz" class="btn btn-purple w-half" target="_blank">MAX</a>
    </div>

    <!-- Третий ряд: Соцсети (Фиолетовый стиль, асимметрия по макету) -->
    <div class="flex-row">
        <a href="https://www.instagram.com/aura_vr_msk?igsh=YXdpcDE2cW5hbnl0&utm_source=qr" class="btn btn-purple w-insta" target="_blank">Instagram*</a>
        <a href="https://vk.com/aura_vr_msk" class="btn btn-purple w-vk" target="_blank">ВКонтакте</a>
        <a href="https://wa.me/79154725800" class="btn btn-purple w-wa" target="_blank">WhatsApp</a>
    </div>

    <!-- Четвертый ряд: Позвонить нам -->
    <a href="tel:+74996424215" class="btn btn-full">Позвонить нам</a>

    <!-- Юридический текст под кнопками -->
    <div class="footer-text">
        * Организация Meta признана экстремистской, запрещена на территории РФ
    </div>
</div>

</body>
</html>
