<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <!-- Подключаем библиотеку иконок Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #0d0617; /* Глубокий фиолетовый фон */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Начинаем сверху */
            padding: 24px 16px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* --- ЛОГОТИП (Верхний блок) --- */
        .logo-block {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 8px; /* Небольшой отступ до кнопок */
        }
        .logo-wrap {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffffff; /* Белое кольцо как на шаблоне */
            overflow: hidden; /* Чтобы картинка не вылезала */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05); /* Легкий фон под лого */
        }
        .logo-wrap img {
            width: 90%;
            height: 90%;
            object-fit: contain; /* Картинка сохраняет пропорции */
            filter: drop-shadow(0 0 5px rgba(139, 92, 246, 0.5)); /* Фиолетовое свечение */
        }

        /* Гибкие ряды для кнопок */
        .flex-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        /* Общий стиль кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            padding: 20px 6px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border-radius: 4px; /* Чуть скругленные, не идеально острые */
            border-width: 2px;
            border-style: solid;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            min-width: 0; 
            word-break: break-word;
            opacity: 1;
        }

        /* Универсальные стили для всех типов иконок */
        .btn i, .btn svg {
            width: 22px; /* Чуть крупнее */
            height: 22px;
            margin-right: 10px;
            font-size: 18px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        
        /* Для правильного цвета встроенной иконки MAX */
        .btn svg {
            fill: #ffffff;
        }
        
        @media (hover: hover) {
            .btn:hover i, .btn:hover svg {
                transform: scale(1.2);
            }
        }

        /* --- СТРОГО ОДИНАКОВЫЕ РАЗМЕРЫ НА КАЖДОЙ СТРОКЕ --- */
        .w-half { 
            flex: 1 1 50%; 
        }

        .w-third { 
            flex: 1 1 33.333%; 
        }

        /* --- КНОПКИ 'НАПИСАТЬ НАМ' (Светло-фиолетовый фон) --- */
        .btn-light-purple {
            background: #cdb4db; /* Пастельно-фиолетовый как на шаблоне */
            color: #3b2b52; /* Темный текст для контраста */
            border-color: transparent;
        }
        .btn-light-purple i, .btn-light-purple svg {
            color: #3b2b52;
        }
        .btn-light-purple svg {
            fill: #3b2b52;
        }
        @media (hover: hover) {
            .btn-light-purple:hover {
                background: #ffffff;
                color: #0d0617;
                border-color: #cdb4db;
                box-shadow: 0 6px 20px rgba(205, 180, 219, 0.5);
                transform: translateY(-2px);
            }
            .btn-light-purple:hover i, .btn-light-purple:hover svg {
                color: #0d0617;
            }
            .btn-light-purple:hover svg {
                fill: #0d0617;
            }
        }

        /* --- САЙТ И ЗВОНОК: Розово-фиолетовый акцентный градиент (Стиль 'full' из старого кода) --- */
        .btn-accent {
            width: 100%;
            padding: 24px 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(236, 72, 153, 0.4));
            border-color: #f43f5e;
            color: #ffffff;
        }
        @media (hover: hover) {
            .btn-accent:hover {
                background: linear-gradient(135deg, #8b5cf6, #ec4899);
                border-color: #ffffff;
                color: #ffffff;
                box-shadow: 0 8px 25px rgba(244, 63, 94, 0.7);
                transform: translateY(-3px);
            }
        }
        .btn-accent:active {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-color: #ffffff;
            color: #ffffff;
        }

        /* --- ОСТАЛЬНЫЕ КНОПКИ: Фиолетовый оттенок (Стиль 'purple' из старого кода) --- */
        .btn-main-purple {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
            color: #ffffff;
        }
        @media (hover: hover) {
            .btn-main-purple:hover {
                background: #8b5cf6;
                color: #ffffff;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
                transform: translateY(-2px);
            }
        }
        .btn-main-purple:active {
            background: #8b5cf6;
            color: #ffffff;
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 12px;
            font-style: italic;
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
            max-width: 90%;
        }

        /* Умная мобильная адаптация для очень узких экранов */
        @media (max-width: 430px) {
            .logo-wrap {
                width: 100px;
                height: 100px;
            }
            .flex-row, .container {
                gap: 8px;
            }
            .btn {
                padding: 16px 4px;
                font-size: 13px;
                flex-direction: column; 
                gap: 4px;
                border-radius: 2px;
            }
            .btn i, .btn svg {
                margin-right: 0;
                width: 20px;
                height: 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
