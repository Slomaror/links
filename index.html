<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            /* Более мягкий, приглушенный темный фон */
            background: radial-gradient(circle at center, #0b0612 0%, #040207 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Гибкие ряды */
        .flex-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        /* Общий стиль кнопок — рамки стали тоньше (1px) и прозрачнее */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 22px 12px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border-radius: 0px;
            transition: all 0.2s ease-in-out;
        }

        /* Симметричные блоки (Ряды 1 и 2) */
        .w-half { 
            flex: 1; 
        }

        /* Асимметричный блок (Ряд 3) */
        .w-insta  { flex: 3; }
        .w-vk     { flex: 4; }
        .w-wa     { flex: 4; }

        /* --- КАРТЫ: Приглушенный матовый розовый --- */
        .btn-pink {
            background: rgba(244, 114, 182, 0.04);
            border: 1px solid rgba(244, 114, 182, 0.4);
            box-shadow: 0 0 8px rgba(244, 114, 182, 0.05);
        }
        @media (hover: hover) {
            .btn-pink:hover {
                background: rgba(244, 114, 182, 0.15);
                border-color: rgba(244, 114, 182, 0.8);
                color: #ffffff;
                box-shadow: 0 0 12px rgba(244, 114, 182, 0.2);
            }
        }
        .btn-pink:active {
            background: rgba(244, 114, 182, 0.25);
        }

        /* --- МЕССЕНДЖЕРЫ: Спокойный лавандово-фиолетовый --- */
        .btn-purple {
            background: rgba(168, 85, 247, 0.04);
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.05);
        }
        @media (hover: hover) {
            .btn-purple:hover {
                background: rgba(168, 85, 247, 0.15);
                border-color: rgba(168, 85, 247, 0.8);
                color: #ffffff;
                box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
            }
        }
        .btn-purple:active {
            background: rgba(168, 85, 247, 0.25);
        }

        /* --- ЗВОНОК: Сдержанный градиент без агрессивного свечения --- */
        .btn-full {
            width: 100%;
            padding: 26px 10px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(244, 114, 182, 0.1));
            border: 1px solid rgba(244, 114, 182, 0.6);
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.1);
        }
        @media (hover: hover) {
            .btn-full:hover {
                background: linear-gradient(135deg, rgba(168, 85, 247, 0.25), rgba(244, 114, 182, 0.25));
                border-color: rgba(255, 255, 255, 0.8);
                box-shadow: 0 0 15px rgba(244, 114, 182, 0.3);
            }
        }
        .btn-full:active {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(244, 114, 182, 0.35));
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.4;
        }

        /* Мобильная адаптация */
        @media (max-width: 400px) {
            .flex-row, .container {
                gap: 10px;
            }
            .btn {
                padding: 18px 6px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Первый ряд: Симметричные карты (Приглушенный розовый) -->
    <div class="flex-row">
        <a href="https://yandex.ru/maps/org/aura_igr/126847755305/" class="btn btn-pink w-half" target="_blank">ЯндексКарты</a>
        <a href="https://2gis.ru/moscow/firm/70000001110439484" class="btn btn-pink w-half" target="_blank">2Гис</a>
    </div>

    <!-- Второй ряд: Симметричные ТГ и Макс (Приглушенный фиолетовый) -->
    <div class="flex-row">
        <a href="https://t.me/aura_vr_msk" class="btn btn-purple w-half" target="_blank">Telegram</a>
        <a href="https://max.ru/id772793277929_biz" class="btn btn-purple w-half" target="_blank">MAX</a>
    </div>

    <!-- Третий ряд: Соцсети (Приглушенный фиолетовый, асимметрия сохранена) -->
    <div class="flex-row">
        <a href="https://www.instagram.com/aura_vr_msk?igsh=YXdpcDE2cW5hbnl0&utm_source=qr" class="btn btn-purple w-insta" target="_blank">Instagram*</a>
        <a href="https://vk.com/aura_vr_msk" class="btn btn-purple w-vk" target="_blank">ВКонтакте</a>
        <a href="https://wa.me/79154725800" class="btn btn-purple w-wa" target="_blank">WhatsApp</a>
    </div>

    <!-- Четвертый ряд: Позвонить нам -->
    <a href="tel:+74996424215" class="btn btn-full">Позвонить нам</a>

    <!-- Юридический текст под кнопками -->
    <div class="footer-text">
        * Организация Meta признана экстремистской, запрещена на территории РФ
    </div>
</div>

</body>
</html>
