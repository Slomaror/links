<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <!-- Подключаем библиотеку иконок Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #0d0617; /* Глубокий фиолетовый фон */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Центрирование по вертикали */
            padding: 24px 16px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* --- ЛОГОТИП --- */
        .logo-block {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 0px;
        }
        .logo-wrap {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #8b5cf6;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }
        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- НАДПИСЬ НАЗВАНИЯ КОМПАНИИ --- */
        .brand-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-top: 4px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
            text-align: center;
        }

        /* Гибкие ряды */
        .flex-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        /* Общий стиль кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            padding: 20px 6px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border-radius: 4px;
            border-width: 2px;
            border-style: solid;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            min-width: 0; 
            word-break: break-word;
        }

        .btn i, .btn svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            font-size: 16px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        
        .btn svg {
            fill: #ffffff;
        }
        
        @media (hover: hover) {
            .btn:hover i, .btn:hover svg {
                transform: scale(1.15);
            }
        }

        .w-half { flex: 1 1 50%; }
        .w-third { flex: 1 1 33.333%; }

        /* Кнопки 'Написать нам' */
        .btn-write-us {
            background: rgba(139, 92, 246, 0.15);
            border-color: #a78bfa;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }
        @media (hover: hover) {
            .btn-write-us:hover {
                background: #a78bfa;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(167, 139, 250, 0.6);
                transform: translateY(-2px);
            }
            .btn-write-us:hover svg {
                fill: #0d0617;
            }
        }

        /* Базовые фиолетовые кнопки */
        .btn-purple {
            background: rgba(139, 92, 246, 0.08);
            border-color: #8b5cf6;
        }
        @media (hover: hover) {
            .btn-purple:hover {
                background: #8b5cf6;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
                transform: translateY(-2px);
            }
            .btn-purple:hover svg {
                fill: #0d0617;
            }
        }

        /* Акцентные кнопки (Сайт и Звонок) */
        .btn-full {
            width: 100%;
            padding: 24px 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: #f43f5e;
        }
        @media (hover: hover) {
            .btn-full:hover {
                background: linear-gradient(135deg, #8b5cf6, #ec4899);
                border-color: #ffffff;
                color: #0d0617;
                box-shadow: 0 8px 25px rgba(244, 63, 94, 0.6);
                transform: translateY(-3px);
            }
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        /* Адаптация для мобильных */
        @media (max-width: 430px) {
            .flex-row, .container { gap: 8px; }
            .btn {
                padding: 16px 4px;
                font-size: 13px;
                flex-direction: column; 
                gap: 4px;
            }
            .btn i, .btn svg { margin-right: 0; }
            .brand-title { font-size: 20px; }
        }
    </style>
</head>
<body>
