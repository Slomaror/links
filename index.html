<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аура Игр | Контакты</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            /* Мягкий темный фон, чтобы цвета 'заиграли' */
            background: #0d0617;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Гибкие ряды */
        .flex-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        /* Общий стиль кнопок — рамки снова четкие (2px) */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            padding: 22px 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border-radius: 0px;
            border-width: 2px;
            border-style: solid;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Симметричные блоки (Ряды 1 и 2) */
        .w-half { 
            flex: 1; 
        }

        /* Асимметричный блок (Ряд 3) */
        .w-insta  { flex: 3; }
        .w-vk     { flex: 4; }
        .w-wa     { flex: 4; }

        /* --- КАРТЫ: Яркий, насыщенный розовый --- */
        .btn-pink {
            background: rgba(236, 72, 153, 0.1);
            border-color: #ec4899; /* Насыщенный розовый */
        }
        @media (hover: hover) {
            .btn-pink:hover {
                background: #ec4899;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
                transform: translateY(-2px);
            }
        }
        .btn-pink:active {
            background: #ec4899;
            color: #0d0617;
            transform: translateY(1px);
        }

        /* --- МЕССЕНДЖЕРЫ: Глубокий, сочный фиолетовый --- */
        .btn-purple {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6; /* Глубокий фиолетовый */
        }
        @media (hover: hover) {
            .btn-purple:hover {
                background: #8b5cf6;
                color: #0d0617;
                border-color: #ffffff;
                box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
                transform: translateY(-2px);
            }
        }
        .btn-purple:active {
            background: #8b5cf6;
            color: #0d0617;
            transform: translateY(1px);
        }

        /* --- ЗВОНОК: Розово-фиолетовый акцентный градиент --- */
        .btn-full {
            width: 100%;
            padding: 26px 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: #f43f5e; /* Кораллово-розовый контур */
        }
        @media (hover: hover) {
            .btn-full:hover {
                background: linear-gradient(135deg, #8b5cf6, #ec4899);
                border-color: #ffffff;
                color: #0d0617;
                box-shadow: 0 8px 25px rgba(244, 63, 94, 0.6);
                transform: translateY(-3px);
            }
        }
        .btn-full:active {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-color: #ffffff;
            color: #0d0617;
            transform: translateY(1px);
        }

        /* Сноска в подвале */
        .footer-text {
            font-size: 11px;
            font-style: italic;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        /* Мобильная адаптация */
        @media (max-width: 400px) {
            .flex-row, .container {
                gap: 10px;
            }
            .btn {
                padding: 18px 6px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Первый ряд: Симметричные карты (Насыщенный розовый) -->
    <div class="flex-row">
        <a href="https://yandex.ru/maps/org/aura_igr/126847755305/" class="btn btn-pink w-half" target="_blank">ЯндексКарты</a>
        <a href="https://2gis.ru/moscow/firm/70000001110439484" class="btn btn-pink w-half" target="_blank">2Гис</a>
    </div>

    <!-- Второй ряд: Симметричные ТГ и Макс (Насыщенный фиолетовый) -->
    <div class="flex-row">
        <a href="https://t.me/aura_vr_msk" class="btn btn-purple w-half" target="_blank">Telegram</a>
        <a href="https://max.ru/id772793277929_biz" class="btn btn-purple w-half" target="_blank">MAX</a>
    </div>

    <!-- Третий ряд: Соцсети (Насыщенный фиолетовый, асимметрия сохранена) -->
    <div class="flex-row">
        <a href="https://www.instagram.com/aura_vr_msk?igsh=YXdpcDE2cW5hbnl0&utm_source=qr" class="btn btn-purple w-insta" target="_blank">Instagram*</a>
        <a href="https://vk.com/aura_vr_msk" class="btn btn-purple w-vk" target="_blank">ВКонтакте</a>
        <a href="https://wa.me/79154725800" class="btn btn-purple w-wa" target="_blank">WhatsApp</a>
    </div>

    <!-- Четвертый ряд: Позвонить нам -->
    <a href="tel:+74996424215" class="btn btn-full">Позвонить нам</a>

    <!-- Юридический текст под кнопками -->
    <div class="footer-text">
        * Организация Meta признана экстремистской, запрещена на территории РФ
    </div>
</div>

</body>
</html>
